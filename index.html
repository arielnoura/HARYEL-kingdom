        let filtered = [...npcs];
        function render() {
            const list = document.getElementById('npc-list');
            list.innerHTML = '';
            filtered.forEach(n => {
                list.innerHTML += `<div class="npc-card">
                    <h3 class="font-bold text-lg">${n.nome}</h3>
                    <p class="text-sm opacity-80">${n.razza} · ${n.classe}</p>
                    <p class="mt-2 text-sm">${n.desc}</p>
                </div>`;
            });
        }
        function sortData(t) {
            if(t=='name-asc') filtered.sort((a,b)=>a.nome.localeCompare(b.nome));
            if(t=='name-desc') filtered.sort((a,b)=>b.nome.localeCompare(a.nome));
            if(t=='age-asc') filtered.sort((a,b)=>(parseInt(a.desc.match(/\d+/))||999)-(parseInt(b.desc.match(/\d+/))||999));
            if(t=='age-desc') filtered.sort((a,b)=>(parseInt(b.desc.match(/\d+/))||999)-(parseInt(a.desc.match(/\d+/))||999));
            render();
        }
        function resetFilters() { filtered = [...npcs]; render(); }
        document.getElementById('search-input').addEventListener('input', e => {
            const q = e.target.value.toLowerCase();
            filtered = npcs.filter(n => (n.nome+n.desc+n.razza+n.classe).toLowerCase().includes(q));
            render();
        });
